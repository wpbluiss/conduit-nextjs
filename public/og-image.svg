<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" repeat="40"/>
  </g>
  
  <!-- Accent glow -->
  <circle cx="900" cy="300" r="300" fill="#06d6a0" opacity="0.05"/>
  <circle cx="200" cy="500" r="200" fill="#3b82f6" opacity="0.04"/>
  
  <!-- Logo -->
  <rect x="80" y="80" width="56" height="56" rx="12" fill="url(#logoGrad)"/>
  <path d="M108.5 86L101 98h5l-1.5 8L112 94h-5l1.5-8z" fill="#0a0e1a" stroke="#0a0e1a" stroke-width="0.5" stroke-linejoin="round" transform="translate(0,2)"/>
  
  <!-- Brand name -->
  <text x="148" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white">Conduit<tspan fill="#06d6a0">AI</tspan></text>
  
  <!-- Main headline -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white">Never Miss</text>
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white">Another Lead</text>
  
  <!-- Subheadline -->
  <text x="80" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#9ca3af">AI voice agents that answer your missed calls,</text>
  <text x="80" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#9ca3af">capture leads, and deliver them instantly.</text>
  
  <!-- Stats row -->
  <rect x="80" y="475" width="300" height="70" rx="12" fill="white" opacity="0.05"/>
  <text x="110" y="505" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#06d6a0" font-weight="600">24/7 COVERAGE</text>
  <text x="110" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#9ca3af">No missed calls, ever</text>
  
  <rect x="410" y="475" width="300" height="70" rx="12" fill="white" opacity="0.05"/>
  <text x="440" y="505" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#06d6a0" font-weight="600">14-DAY FREE TRIAL</text>
  <text x="440" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#9ca3af">No setup fee required</text>
  
  <rect x="740" y="475" width="370" height="70" rx="12" fill="white" opacity="0.05"/>
  <text x="770" y="505" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#06d6a0" font-weight="600">CONDUITAI.IO</text>
  <text x="770" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#9ca3af">Start recovering revenue today</text>
  
  <!-- Right side decorative element - phone mockup hint -->
  <rect x="850" y="100" width="280" height="340" rx="20" fill="white" opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <rect x="870" y="130" width="240" height="24" rx="6" fill="#06d6a0" opacity="0.15"/>
  <rect x="870" y="170" width="180" height="16" rx="4" fill="white" opacity="0.06"/>
  <rect x="870" y="200" width="220" height="16" rx="4" fill="white" opacity="0.04"/>
  <rect x="870" y="240" width="240" height="50" rx="8" fill="white" opacity="0.05"/>
  <rect x="870" y="310" width="240" height="50" rx="8" fill="white" opacity="0.05"/>
  <rect x="870" y="380" width="240" height="40" rx="20" fill="#06d6a0" opacity="0.2"/>
</svg>
